<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="quill.snow.css">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #1e1e1e; color: #f0f0f0; }

    /* Dark toolbar */
    #toolbar {
      background: #2d2d2d;
      border-bottom: 1px solid #444;
    }
    .ql-toolbar.ql-snow {
      background: #2d2d2d;
      border: none;
      border-bottom: 1px solid #444;
    }
    /* Toolbar button icons: make SVG paths/strokes white */
    .ql-toolbar.ql-snow .ql-stroke { stroke: #d4d4d4; }
    .ql-toolbar.ql-snow .ql-fill  { fill:   #d4d4d4; }
    .ql-toolbar.ql-snow .ql-picker-label { color: #d4d4d4; }
    .ql-toolbar.ql-snow button:hover .ql-stroke,
    .ql-toolbar.ql-snow button.ql-active .ql-stroke { stroke: #ffffff; }
    .ql-toolbar.ql-snow button:hover .ql-fill,
    .ql-toolbar.ql-snow button.ql-active .ql-fill   { fill:   #ffffff; }

    /* Dark editor area */
    .ql-container.ql-snow {
      border: none;
      background: #1e1e1e;
    }
    /* Map registered Quill font value to actual font-family */
    .ql-font-calibrilight {
      font-family: 'Calibri Light', Calibri, sans-serif !important;
    }
    /* Ensure base editor and all children always use Calibri Light 10pt */
    .ql-editor,
    .ql-editor * {
      font-family: 'Calibri Light', Calibri, sans-serif;
      font-size: 10pt;
    }
    .ql-editor {
      height: 100%;
      color: #f0f0f0;
      background: #36353a;
    }
    /* Placeholder text color */
    .ql-editor.ql-blank::before { color: #777; font-style: normal; }

    #editor { height: calc(100% - 42px); font-family: 'Calibri Light'; font-size: 10pt; }
  </style>
</head>
<body>
  <div id="toolbar">
    <span class="ql-formats">
      <button class="ql-bold"></button>
      <button class="ql-italic"></button>
      <button class="ql-underline"></button>
      <button class="ql-strike"></button>
    </span>
    <span class="ql-formats">
      <button class="ql-list" value="bullet"></button>
      <button class="ql-list" value="ordered"></button>
    </span>
    <span class="ql-formats">
      <button class="ql-clean"></button>
    </span>
  </div>
  <div id="editor"></div>
  <script src="quill.js"></script>
  <script>
    // Register 'calibrilight' as a whitelisted font value
    var Font = Quill.import('formats/font');
    Font.whitelist = ['calibrilight'];
    Quill.register(Font, true);

    // Register '10pt' as a whitelisted size value
    var Size = Quill.import('attributors/style/size');
    Size.whitelist = ['10pt'];
    Quill.register(Size, true);

    var quill = new Quill('#editor', {
      theme: 'snow',
      modules: { toolbar: '#toolbar' }
    });

    // Apply default format so new paragraphs inherit Calibri Light 10pt.
    // quill.format() sets the format at the current selection/cursor
    // which Quill uses as the default for new content.
    quill.format('font', 'calibrilight');
    quill.format('size', '10pt');

    function getContent() { return quill.root.innerHTML; }
    function setContent(html) { quill.root.innerHTML = html; quill.update(); }
  </script>
</body>
</html>
